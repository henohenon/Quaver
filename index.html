<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Quaver</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #0b0b10;
        color: #e7e7ef;
        min-height: 100vh;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 1.5rem 1rem 4rem;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0;
        letter-spacing: 0.05em;
      }
      .nav {
        font-size: 0.8rem;
        color: #6a6a80;
        text-decoration: none;
      }
      .nav:hover { color: #aaa; }
      .screen { display: none; }
      .screen.active { display: block; }
      form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      input[type="text"] {
        flex: 1;
        padding: 0.6rem 0.8rem;
        background: #16161f;
        color: inherit;
        border: 1px solid #2a2a38;
        border-radius: 4px;
        font: inherit;
      }
      button {
        padding: 0.6rem 1.2rem;
        background: #4a4aff;
        color: white;
        border: none;
        border-radius: 4px;
        font: inherit;
        cursor: pointer;
      }
      button:hover:not(:disabled) { background: #5a5aff; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .video-wrap {
        position: relative;
        aspect-ratio: 4 / 3;
        background: #000;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 1rem;
      }
      .video-wrap video,
      .video-wrap canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .video-wrap video {
        object-fit: cover;
      }
      .video-wrap canvas {
        display: none;
        background: #0b0b10;
      }
      .video-wrap.playing video { display: none; }
      .video-wrap.playing canvas { display: block; }
      .video-wrap .placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #5a5a6a;
        font-size: 0.9rem;
      }
      .status {
        font-size: 0.85rem;
        color: #8a8aa0;
        margin: 0 0 1rem;
        min-height: 1.2em;
      }
      .scan-controls {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      pre {
        background: #16161f;
        border: 1px solid #2a2a38;
        border-radius: 4px;
        padding: 1rem;
        overflow-x: auto;
        font-size: 0.85rem;
        margin: 0;
      }
      .last-qr {
        font-size: 0.8rem;
        color: #6a6a80;
        margin: 0 0 0.5rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Quaver</h1>
        <a id="navLink" class="nav" href="#/debug">debug ▸</a>
      </header>

      <section id="scanScreen" class="screen">
        <div id="videoWrap" class="video-wrap">
          <video id="video" playsinline muted></video>
          <canvas id="effectCanvas"></canvas>
          <div id="videoPlaceholder" class="placeholder">「スキャン開始」を押してください</div>
        </div>
        <p id="scanStatus" class="status"></p>
        <div class="scan-controls">
          <button id="scanStart" type="button">スキャン開始</button>
          <button id="scanStop" type="button" disabled>停止</button>
        </div>
        <p id="lastQr" class="last-qr"></p>
        <pre id="scanOutput">QRをスキャンすると、対応する変調パラメータと音が再生されます</pre>
      </section>

      <section id="debugScreen" class="screen">
        <form id="form">
          <input id="text" type="text" placeholder="文字列を入力..." autocomplete="off" />
          <button type="submit">鳴らす</button>
        </form>
        <pre id="output">ここに変調パラメータが表示されます</pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
